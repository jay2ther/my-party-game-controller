<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Party Controller</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: center;
        }
        /* Screens */
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        /* Inputs & Buttons */
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e94560;
            background-color: #16213e;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
            text-transform: uppercase;
        }
        button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            background-color: #e94560;
            color: white;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px #c21a3a;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .error-message {
            color: #ff4757;
            margin-top: 10px;
            font-size: 14px;
        }
        /* Gamepad Grid Layout */
        .gamepad {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-action {
            height: 100px;
            background-color: #00b894;
            box-shadow: 0 4px #009475;
        }
        .btn-action:active {
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Join Screen -->
        <div id="join-screen" class="screen active">
            <h2>Join the Game</h2>
            <input type="text" id="room-input" placeholder="Room Code" maxlength="4">
            <input type="text" id="name-input" placeholder="Your Name" maxlength="12">
            <button id="join-btn">CONNECT</button>
            <div id="error-display" class="error-message"></div>
        </div>

        <!-- Controller Gamepad Screen -->
        <div id="gamepad-screen" class="screen">
            <h3 id="player-display">Connecting...</h3>
            <div class="gamepad">
                <button class="btn-action" id="btn-left">LEFT</button>
                <button class="btn-action" id="btn-right">RIGHT</button>
                <button class="btn-action" id="btn-action-a" style="grid-column: span 2; background-color: #0984e3; box-shadow: 0 4px #0764ad;">ACTION</button>
            </div>
            <button id="leave-btn" style="background-color: #2d3436; box-shadow: 0 4px #1b2021; margin-top: 30px;">LEAVE ROOM</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
