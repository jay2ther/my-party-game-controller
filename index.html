<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light dark">
    <title>Universal Game Controller</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin: 0; padding: 20px; transition: 0.3s; padding-bottom: 60px; }
        input { color: CanvasText; background-color: Canvas; font-size:20px; padding:15px; width:80%; text-align: center; border-radius: 10px; border: 2px solid #555; margin-bottom:15px; }
        button { font-size:22px; padding:18px; width:85%; background:#2196F3; color:white; border-radius:12px; border: none; font-weight: bold; transition: transform 0.05s ease, filter 0.05s ease; -webkit-tap-highlight-color: transparent; cursor: pointer; margin-bottom:12px; }
        button:active { transform: scale(0.94); filter: brightness(0.8); }
        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #ffffff; }
        }
        .version-footer { position: fixed; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 11px; color: #555; font-family: monospace; }
        
        /* PERSISTENT SCOREBOARD / BALANCE LEADER HUD */
        .hud-bar { display: none; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 12px 16px; background: rgba(255,255,255,0.07); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); font-weight: bold; }
        .hud-identity { font-size: 16px; color: #bbb; }
        .hud-score { font-size: 18px; color: #4CAF50; }
        
        /* DYNAMIC CONTAINER */
        #dynamicCanvas { width: 100%; margin-top: 20px; }
        .layout-prompt { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #ffb300; }
    </style>
</head>
<body>

    <div id="universalHUD" class="hud-bar">
        <span id="hudPlayerName" class="hud-identity">---</span>
        <span id="hudStatValue" class="hud-score">Score: 0</span>
    </div>

    <div id="loginScreen" style="margin-top: 50px;">
        <h1 style="font-size: 36px; margin-bottom: 5px;">PARTY PACK</h1>
        <p style="color:#888; margin-bottom: 35px;">Enter the Room Code displayed on the TV</p>
        <input type="text" id="playerName" placeholder="YOUR NAME" maxlength="12"><br>
        <input type="text" id="roomCode" placeholder="ROOM CODE" maxlength="5" style="text-transform: uppercase;"><br>
        <button onclick="joinRoomAction()" style="background:#4CAF50; margin-top:15px;">ENTER LOBBY</button>
    </div>

    <div id="dynamicCanvas"></div>

    <div id="disconnectAlert" style="display:none; margin-top: 100px;">
        <h2 style="color: #f44336; font-size: 32px;">Connection Lost!</h2>
        <p style="color: #aaa;">Attempting to re-link to the room automatically...</p>
    </div>

    <div class="version-footer">Framework Core: v1.0</div>

    <script src="app.js?v=1"></script>
</body>
</html>
